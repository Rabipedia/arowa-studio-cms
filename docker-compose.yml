services:
  postgres:
    image: postgres:16-alpine
    container_name: arowa-studio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arowa_studio
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    ports:
      - "5432:5432"
    volumes:
      - arowa_pgdata:/var/lib/postgresql/data

volumes:
  arowa_pgdata: